<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Cheers — collaborative trip planner.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Cheers">
  <meta name="theme-color" content="#0B0B1E">
  <link rel="manifest" href="manifest.json">
  <title>Cheers</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0B0B1E; height: 100%; }
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #FFB86B; font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px; letter-spacing: 0.3px;
      background: linear-gradient(135deg, #0B0B1E, #321B4E 55%, #E8735A);
    }
    #loader::before {
      content: ''; width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15); border-top-color: #FFB86B;
      animation: spin 0.9s linear infinite; margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader">Pouring the drinks…</div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
